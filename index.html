<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>4 Merge Cloud</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e07820">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="4 Merge Cloud">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #181818; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; position: absolute; top: 0; left: 0; }

    #viewer {
      position: absolute;
      inset: 0;
    }

    #splitDivider {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px; left: 50%;
      background: #aaa;
      pointer-events: none;
      display: none;
      z-index: 5;
    }

    /* ── Controls panel ── */
    #controls {
      position: absolute;
      top: 10px; left: 10px;
      z-index: 20;
      background: rgba(24, 24, 24, 0.92);
      color: #ddd;
      padding: 8px;
      border: 1px solid #444;
      font-size: 13px;
      border-radius: 8px;
      width: 200px;
      user-select: none;
      max-height: calc(100vh - 20px);
      overflow-y: auto;
    }

    #controls button {
      display: block;
      width: 100%;
      margin: 2px 0;
      padding: 6px 8px;
      font-size: 12px;
      background: #333;
      color: #ddd;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      text-align: left;
    }
    #controls button:hover { background: #484848; }
    #controls button.active { background: #b05a10; border-color: #d07020; color: #fff; }

    #fileInputLabel {
      display: block;
      width: 100%;
      margin: 2px 0;
      padding: 6px 8px;
      font-size: 12px;
      background: #1a4a7a;
      color: #eee;
      border: 1px solid #2a6aaa;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
    }
    #fileInputLabel:hover { background: #2a5a9a; }
    #fileInput { display: none; }

    .sep { border-top: 1px solid #444; margin: 5px 0; }

    /* Loaded clouds list */
    #cloudListPanel {
      max-height: 90px;
      overflow-y: auto;
      margin: 3px 0;
      font-size: 11px;
    }
    #cloudListPanel:empty::before {
      content: 'No clouds loaded';
      color: #666;
      display: block;
      padding: 2px 4px;
      font-style: italic;
    }
    .cloud-item {
      display: flex;
      align-items: center;
      padding: 2px 4px;
      cursor: pointer;
      border-radius: 3px;
      border: 1px solid transparent;
    }
    .cloud-item:hover { background: #3a3a3a; }
    .cloud-item.selected { background: #5a2800; border-color: #b05a10; }
    .cloud-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cloud-del { color: #f55; cursor: pointer; padding: 0 4px; flex-shrink: 0; font-size: 13px; line-height: 1; }
    .cloud-del:hover { color: #ff8888; }

    /* Numeric transform */
    #numericTransform {
      display: none;
      font-size: 11px;
      background: #222;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 5px;
      margin: 3px 0;
    }
    #numericTransform table { width: 100%; }
    #numericTransform td { padding: 1px 2px; color: #bbb; }
    #numericTransform input[type=number] {
      width: 60px;
      font-size: 11px;
      background: #333;
      color: #eee;
      border: 1px solid #555;
      border-radius: 3px;
      padding: 2px 4px;
    }

    /* ── Measurements ── */
    #measureList {
      position: absolute;
      bottom: 55px;
      right: 10px;
      z-index: 20;
      background: rgba(24, 24, 24, 0.92);
      color: #eee;
      padding: 8px 12px;
      font-size: 11px;
      font-family: monospace;
      border: 1px solid #555;
      border-radius: 6px;
      max-width: 300px;
      white-space: pre;
      display: none;
    }

    /* Alignment badge */
    #alignBadge {
      position: absolute;
      top: 42px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 140, 80, 0.92);
      color: #fff;
      padding: 5px 16px;
      border-radius: 6px;
      font-size: 13px;
      z-index: 25;
      display: none;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Loading badge */
    #loadingBadge {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 80, 180, 0.92);
      color: #fff;
      padding: 5px 16px;
      border-radius: 6px;
      font-size: 13px;
      z-index: 25;
      display: none;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Measure mode badge */
    #measureBadge {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(180, 60, 0, 0.92);
      color: #fff;
      padding: 5px 16px;
      border-radius: 6px;
      font-size: 13px;
      z-index: 25;
      display: none;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── View toolbar ── */
    #viewToolbar {
      position: absolute;
      right: 10px;
      bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      z-index: 15;
    }

    .view-btn {
      width: 38px;
      height: 38px;
      border: 1px solid #555;
      background: rgba(30, 30, 30, 0.88);
      color: #ccc;
      padding: 0;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
      border-radius: 5px;
      line-height: 1.2;
    }
    .view-btn:hover { background: rgba(70, 70, 70, 0.92); color: #fff; }
    .view-btn.ortho-active { background: rgba(0, 80, 160, 0.9); border-color: #3a8aff; color: #fff; }

    .hidden { display: none !important; }

    /* Lasso canvas overlay — purament visual, mai captura events */
    #lassoCanvas {
      position: absolute;
      inset: 0;
      display: none;
      pointer-events: none;
      z-index: 10;
    }
    /* Cursor crosshair sobre el viewer quan el lasso és actiu */
    #viewer.lasso-active {
      cursor: crosshair;
    }
    #lassoCancel {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: none;
      background: rgba(140, 20, 20, 0.95);
      color: #fff;
      border: 1px solid #ff6060;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 14px;
      cursor: pointer;
    }
    #lassoBadge {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(160, 20, 20, 0.92);
      color: #fff;
      padding: 5px 16px;
      border-radius: 6px;
      font-size: 13px;
      z-index: 25;
      display: none;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Noise filter panel */
    #noiseFilterPanel {
      display: none;
      font-size: 11px;
      background: #1a1a1a;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 6px;
      margin: 3px 0;
    }
    #noiseFilterPanel table { width: 100%; }
    #noiseFilterPanel td { padding: 2px 2px; color: #bbb; }
    #noiseFilterPanel input[type=number] {
      width: 50px; font-size: 11px;
      background: #333; color: #eee;
      border: 1px solid #555; border-radius: 3px; padding: 2px 4px;
    }

    /* DXF overlay list */
    #dxfInputLabel {
      display: block; width: 100%; margin: 2px 0;
      padding: 6px 8px; font-size: 12px;
      background: #1a3a1a; color: #aea;
      border: 1px solid #2a6a2a; border-radius: 4px;
      cursor: pointer; text-align: center;
    }
    #dxfInputLabel:hover { background: #2a4a2a; }
    #dxfInput { display: none; }
    #dxfListPanel {
      max-height: 80px; overflow-y: auto;
      margin: 3px 0; font-size: 11px;
    }
    #dxfListPanel:empty::before {
      content: 'No DXF loaded'; color: #666;
      display: block; padding: 2px 4px; font-style: italic;
    }
    .dxf-item {
      display: flex; align-items: center;
      padding: 2px 4px; border-radius: 3px;
      border: 1px solid transparent;
    }
    .dxf-item:hover { background: #3a3a3a; }
    .dxf-color { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; margin-right: 5px; }
    .dxf-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #ccc; }
    .dxf-eye { cursor: pointer; padding: 0 4px; flex-shrink: 0; font-size: 13px; }
    .dxf-del { color: #f55; cursor: pointer; padding: 0 4px; flex-shrink: 0; font-size: 13px; }
    .dxf-del:hover { color: #ff8888; }

    /* Transform confirm badge */
    #confirmBadge {
      position: absolute;
      top: 42px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 160, 80, 0.95);
      color: #fff; padding: 5px 18px;
      border-radius: 6px; font-size: 13px;
      z-index: 26; display: none;
      pointer-events: none; white-space: nowrap;
      transition: opacity 0.4s;
    }

    /* Annotation canvas — always on top, pointer-events managed by JS */
    #annotateCanvas {
      position: absolute; inset: 0;
      z-index: 12; pointer-events: none;
      display: block;
    }
    #viewer.annotate-active { cursor: crosshair; }

    /* Annotation toolbar */
    #annotatePanel {
      display: none;
      background: #1a1a1a;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 6px; margin: 3px 0;
      font-size: 11px;
    }
    #annotatePanel .color-row {
      display: flex; gap: 4px; margin-bottom: 4px;
    }
    .ann-color {
      width: 22px; height: 22px;
      border-radius: 4px;
      border: 2px solid transparent;
      cursor: pointer; flex-shrink: 0;
    }
    .ann-color.selected { border-color: #fff; }
    #annotatePanel .mode-row {
      display: flex; gap: 3px; margin-bottom: 4px;
    }
    #annotatePanel .mode-row button {
      flex: 1; font-size: 10px; padding: 3px 2px;
    }
    #annotatePanel input[type=range] { width: 80px; vertical-align: middle; }

    /* AI Assistant panel */
    #btnAI {
      background: #1a2a4a;
      border-color: #3a6aaa;
      color: #88ccff;
    }
    #btnAI:hover { background: #2a3a6a; }
    #btnAI.active { background: #2a4a8a; border-color: #5a9aff; color: #ccecff; }
    #aiPanel {
      display: none;
      background: #0d1d2d;
      border: 1px solid #1a4a7a;
      border-radius: 4px;
      padding: 6px;
      margin: 3px 0;
    }
    #aiKeyRow {
      display: flex; gap: 3px; margin-bottom: 5px;
    }
    #aiKeyInput {
      flex: 1; background: #1a2a3a; color: #aaa;
      border: 1px solid #2a4a6a; border-radius: 3px;
      padding: 2px 5px; font-size: 10px;
    }
    #aiKeySave {
      background: #1a4a1a; color: #8f8; border: 1px solid #2a7a2a;
      border-radius: 3px; padding: 2px 6px; cursor: pointer; font-size: 10px;
      flex-shrink: 0;
    }
    #aiMessages {
      max-height: 110px; overflow-y: auto;
      margin-bottom: 5px; font-size: 10px; line-height: 1.5;
    }
    .ai-u { color: #88ccff; margin: 1px 0; }
    .ai-a { color: #88eebb; margin: 1px 0; }
    .ai-x { color: #ff9966; margin: 1px 0; font-style: italic; }
    .ai-e { color: #ff6666; margin: 1px 0; }
    #aiInputRow { display: flex; gap: 3px; }
    #aiTextInput {
      flex: 1; background: #1a2a3a; color: #eee;
      border: 1px solid #2a5a8a; border-radius: 3px;
      padding: 3px 5px; font-size: 11px;
    }
    #aiVoiceBtn, #aiSendBtn {
      background: #1a3a6a; color: #adf;
      border: 1px solid #2a6aaa; border-radius: 3px;
      padding: 3px 7px; cursor: pointer; font-size: 12px; flex-shrink: 0;
    }
    #aiVoiceBtn:hover, #aiSendBtn:hover { background: #2a4a8a; }
    #aiVoiceBtn.recording { background: #7a1a1a; border-color: #cc3333; color: #faa; }

    /* Auto-align panel */
    #autoAlignPanel {
      display: none;
      font-size: 11px;
      background: #1a1a1a;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 6px;
      margin: 3px 0;
      line-height: 1.6;
    }
    #autoAlignPanel button {
      font-size: 11px;
      padding: 3px 7px;
      margin: 2px 2px 0 0;
      display: inline-block;
      width: auto;
    }

  </style>
</head>
<body>

  <div id="controls">
    <label id="fileInputLabel" for="fileInput">&#128194; Load (XYZ / PLY)</label>
    <input type="file" id="fileInput" multiple accept=".xyz,.ply,.txt,text/plain,application/octet-stream">

    <div id="cloudListPanel"></div>

    <div class="sep"></div>
    <button id="btnUndo" disabled style="background:#2a2a2a;color:#888;">&#8617; Undo</button>

    <div class="sep"></div>
    <button id="modeTranslate">&#8596; Move cloud</button>
    <button id="modeRotate">&#8635; Rotate cloud</button>

    <button id="toggleNumeric">&#9881; Numeric transform</button>
    <div id="numericTransform">
      <table>
        <tr><td>X:</td><td><input id="tx" type="number" step="0.001" value="0"></td></tr>
        <tr><td>Y:</td><td><input id="ty" type="number" step="0.001" value="0"></td></tr>
        <tr><td>Z:</td><td><input id="tz" type="number" step="0.001" value="0"></td></tr>
        <tr><td>Rx°:</td><td><input id="rx" type="number" value="0"></td></tr>
        <tr><td>Ry°:</td><td><input id="ry" type="number" value="0"></td></tr>
        <tr><td>Rz°:</td><td><input id="rz" type="number" value="0"></td></tr>
      </table>
      <button id="applyTransform" style="margin-top:4px">Apply</button>
    </div>

    <div class="sep"></div>
    <button id="createClipBox">&#9634; Clipping box</button>
    <button id="moveClipBox">&#8596; Move box</button>
    <button id="rotateClipBox">&#8635; Rotate box</button>
    <button id="applyClipBox" style="background:#1a4a1a;border-color:#2a7a2a;color:#aef;">&#9984; Apply clip (crop)</button>
    <button id="removeClipBox">&#10005; Remove box</button>
    <button id="btnExportSection">&#8659; Export section DXF</button>

    <div class="sep"></div>
    <button id="align2pt">&#8853; Align 2 points</button>
    <button id="align3pt">&#8853; Align 3 points</button>
    <button id="btnAutoAlign">&#127912; Auto-align (color)</button>
    <button id="btnICP" style="background:#1a3a5a;border-color:#2a6aaa;color:#adf;">&#9881; ICP fine alignment</button>
    <div id="autoAlignPanel">
      <div id="autoAlignResult">...</div>
      <button id="btnApplyAutoAlign" style="display:none">&#10003; Apply</button>
      <button id="btnCancelAutoAlign">&#10005; Cancel</button>
    </div>

    <div class="sep"></div>
    <button id="btnRectErase">&#9644; Rectangle erase</button>
    <button id="btnLassoErase">&#9999; Freehand erase</button>

    <div class="sep"></div>
    <button id="btnAnnotate">&#9999; Draw / annotate</button>
    <div id="annotatePanel">
      <div class="color-row">
        <div class="ann-color selected" data-color="#ff4444" style="background:#ff4444"></div>
        <div class="ann-color" data-color="#ffdd00" style="background:#ffdd00"></div>
        <div class="ann-color" data-color="#00ddff" style="background:#00ddff"></div>
        <div class="ann-color" data-color="#00ff88" style="background:#00ff88"></div>
        <div class="ann-color" data-color="#ffffff" style="background:#ffffff"></div>
      </div>
      <div class="mode-row">
        <button id="annModeFree" class="active">&#9999; Freehand</button>
        <button id="annModeLine">&#9135; Line</button>
        <button id="annModeArrow">&#8594; Arrow</button>
      </div>
      <div style="color:#bbb;margin-bottom:3px">
        Width: <input type="range" id="annWidth" min="1" max="8" value="2">
      </div>
      <button id="annUndo" style="width:48%;display:inline-block">&#8617; Undo stroke</button>
      <button id="annClear" style="width:48%;display:inline-block;background:#5a1010;border-color:#aa2020;color:#fcc">&#128465; Clear all</button>
    </div>

    <div class="sep"></div>
    <button id="btnNoiseFilter">&#10022; Noise filter</button>
    <div id="noiseFilterPanel">
      <table>
        <tr><td>Agressivitat:</td><td>
          <input id="noiseSigma" type="range" min="0.5" max="5" step="0.1" value="2" style="width:70px;vertical-align:middle">
          <span id="noiseSigmaVal">2.0</span>&#963;
        </td></tr>
        <tr><td>Ve&#239;ns K:</td><td>
          <input id="noiseK" type="number" value="10" min="3" max="30">
        </td></tr>
      </table>
      <button id="btnApplyNoise">Apply filter</button>
    </div>

    <div class="sep"></div>
    <label id="dxfInputLabel" for="dxfInput">&#128208; Load DXF overlay</label>
    <input type="file" id="dxfInput" multiple accept=".dxf">
    <div id="dxfListPanel"></div>

    <div class="sep"></div>
    <button id="toggleMeasure">&#128207; Measure mode</button>
    <button id="clearMeasures">&#128465; Clear measures</button>

    <div class="sep"></div>
    <button id="btnAI">&#129302; AI Assistant</button>
    <div id="aiPanel">
      <div id="aiKeyRow">
        <input type="password" id="aiKeyInput" placeholder="sk-ant-api03-...">
        <button id="aiKeySave">&#128190; Save key</button>
      </div>
      <div id="aiMessages"></div>
      <div id="aiInputRow">
        <input type="text" id="aiTextInput" placeholder="Escriu una ordre..." autocomplete="off">
        <button id="aiVoiceBtn" title="Veu">&#127908;</button>
        <button id="aiSendBtn">&#9654;</button>
      </div>
    </div>

    <div class="sep"></div>
    <button id="merge">&#8659; Merge &amp; download XYZ</button>
    <button id="btnReset" style="background:#5a1010;border-color:#aa2020;color:#fcc;">&#9851; Reset all</button>
  </div>

  <div id="viewer">
    <canvas id="lassoCanvas"></canvas>
    <canvas id="annotateCanvas"></canvas>
    <button id="lassoCancel">&#10005; Cancel lasso</button>
    <div id="confirmBadge">&#10003; Position saved</div>
    <div id="loadingBadge">&#9203; Loading file...</div>
    <div id="measureBadge">&#128207; Measure mode — click two points on the cloud</div>
    <div id="lassoBadge">&#9999; Erase — drag to select area, release to delete</div>
    <div id="alignBadge"></div>

    <div id="measureList"></div>

    <!-- View toolbar (right side) -->
    <div id="viewToolbar">
      <button id="viewA_3d"    class="view-btn" title="3D Perspective">3D</button>
      <button id="viewA_top"   class="view-btn" title="Top view">TP</button>
      <button id="viewA_front" class="view-btn" title="Front view">FR</button>
      <button id="viewA_back"  class="view-btn" title="Back view">BK</button>
      <button id="viewA_right" class="view-btn" title="Right side">RT</button>
      <button id="viewA_left"  class="view-btn" title="Left side">LT</button>
    </div>
  </div>

  <script>window.APP_LANG = 'en';</script>
  <script type="module" src="main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => console.warn('SW not registered:', err));
      });
    }
  </script>
</body>
</html>
